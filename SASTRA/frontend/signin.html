<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SASTRA - Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
    <script>
    (function () {
      try {
        var savedTheme = localStorage.getItem("sastra-theme");
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (savedTheme === "dark" || (!savedTheme && prefersDark)) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      } catch (_error) {}
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-start: #c8e6e0;
      --bg-mid:   #dde8f0;
      --bg-end:   #e8ddf0;
      --text-primary: #0a0a0a;
      --text-muted: #6b7280;
      --btn-dark: #0a0a0a;
      --btn-dark-text: #ffffff;
      --card-bg: #f3f3f3;
      --input-bg: #d9d9d9;
      --radius: 14px;
    }

    html, body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 45%, var(--bg-end) 100%);
      color: var(--text-primary);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.35; pointer-events: none; z-index: 1; }
    .blob-1 { width: 480px; height: 480px; background: radial-gradient(circle, #a7f3d0, transparent 70%); top: -100px; right: 100px; animation: drift 12s ease-in-out infinite alternate; }
    .blob-2 { width: 380px; height: 380px; background: radial-gradient(circle, #bfdbfe, transparent 70%); bottom: -80px; right: 200px; animation: drift 16s 2s ease-in-out infinite alternate; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.06); } }

    nav {
      position: relative;
      z-index: 10;
      padding: 28px 56px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-primary);
      text-decoration: none;
    }

    .logo svg { width: 26px; height: 26px; }

    .page-center {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: calc(100vh - 100px);
      padding: 20px;
    }

    @supports (min-height: 100dvh) {
      .page-center { min-height: calc(100dvh - 100px); }
    }

    .card {
      background: var(--card-bg);
      border-radius: 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      padding: 52px 56px 48px;
      width: 100%;
      max-width: 520px;
      text-align: center;
      animation: fadeUp 0.6s ease both;
      margin-top: auto;
      margin-bottom: auto;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      font-family: 'Sora', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 0.92rem;
      color: var(--text-muted);
      margin-bottom: 36px;
    }

    .field {
      text-align: left;
      margin-bottom: 24px;
    }

    .field label {
      display: block;
      font-family: 'Sora', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .field input {
      width: 100%;
      background: var(--input-bg);
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text-primary);
      outline: none;
      transition: box-shadow 0.2s ease, background 0.2s ease;
    }

    .field input:focus {
      background: #ccc;
      box-shadow: 0 0 0 2px rgba(10,10,10,0.15);
    }

    .btn-submit {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      font-family: 'Sora', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      background: var(--btn-dark);
      color: var(--btn-dark-text);
      border: 1.5px solid var(--btn-dark);
      letter-spacing: 0.01em;
    }

    .btn-submit:hover {
      background: #222;
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.22);
    }

    .btn-submit:active { transform: translateY(0); }

    .login-error {
      display: none;
      margin-top: 8px;
      margin-bottom: 16px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #991b1b;
      background: rgba(254, 226, 226, 0.9);
      border: 1px solid rgba(248, 113, 113, 0.45);
      text-align: left;
    }

    .login-error.show {
      display: block;
    }

    .card-footer {
      margin-top: 28px;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .card-footer a {
      color: var(--text-primary);
      text-decoration: underline;
      font-weight: 700;
      transition: opacity 0.15s;
    }

    .card-footer a:hover { opacity: 0.6; }

    @media (max-height: 820px) {
      nav { padding: 16px 56px; }
      .page-center { min-height: calc(100vh - 60px); padding: 16px 20px; }
      .card { padding: 32px 40px 28px; border-radius: 22px; }
      .card-sub { margin-bottom: 24px; }
      .field { margin-bottom: 16px; }
      .field input { padding: 11px 14px; }
      .card-footer { margin-top: 18px; }
    }

    @media (max-height: 700px) {
      nav { padding: 12px 56px; }
      .page-center { min-height: auto; padding: 12px 20px; }
      .card { padding: 24px 32px 20px; }
      .card-title { font-size: 1.3rem; }
      .card-sub { margin-bottom: 16px; font-size: 0.85rem; }
      .field { margin-bottom: 12px; }
      .field label { margin-bottom: 5px; font-size: 0.82rem; }
      .field input { padding: 10px 12px; font-size: 0.9rem; border-radius: 10px; }
      .btn-submit { padding: 11px; margin-top: 10px; font-size: 0.88rem; }
      .card-footer { margin-top: 14px; font-size: 0.82rem; }
    }

    @media (max-width: 560px) {
      nav { padding: 20px 24px; }
      .card { padding: 36px 24px 32px; }
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
  <link rel="stylesheet" href="/static/theme.css"/>
  <script src="/static/theme.js" defer></script>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <nav>
    <a href="sastra-landing.html" class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/>
      </svg>
      SASTRA
    </a>
  </nav>

  <div class="page-center">
    <div class="card">
      <h1 class="card-title">Sign In</h1>
      <p class="card-sub">Welcome back</p>

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="" autocomplete="username"/>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="" autocomplete="current-password"/>
      </div>

      <p id="login-error" class="login-error" role="alert" aria-live="polite"></p>

      <button class="btn-submit" onclick="handleLogin()">Login</button>

      <div style="display:flex;align-items:center;gap:12px;margin-top:20px;margin-bottom:4px;">
        <div style="flex:1;height:1px;background:rgba(0,0,0,0.12);"></div>
        <span style="font-size:0.82rem;color:var(--text-muted);white-space:nowrap;">or continue with</span>
        <div style="flex:1;height:1px;background:rgba(0,0,0,0.12);"></div>
      </div>

      <a href="/auth/google" style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;margin-top:12px;padding:13px;border-radius:999px;border:1.5px solid rgba(0,0,0,0.15);background:#fff;color:#0a0a0a;font-family:'Sora',sans-serif;font-size:0.92rem;font-weight:600;text-decoration:none;transition:box-shadow 0.18s ease,transform 0.18s ease;" onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.12)';this.style.transform='translateY(-1px)'" onmouseout="this.style.boxShadow='';this.style.transform=''">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </a>

      <p class="card-footer">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </div>

  <script>
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginError = document.getElementById('login-error');

    function showLoginError(message) {
      loginError.textContent = message;
      loginError.classList.add('show');
    }

    function clearLoginError() {
      loginError.textContent = '';
      loginError.classList.remove('show');
    }

    function clearFieldHighlight(input) {
      input.style.boxShadow = '';
    }

    usernameInput.addEventListener('input', function () {
      clearFieldHighlight(usernameInput);
      clearLoginError();
    });

    passwordInput.addEventListener('input', function () {
      clearFieldHighlight(passwordInput);
      clearLoginError();
    });

    async function handleLogin() {
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();

      clearLoginError();

      if (!username || !password) {
        usernameInput.style.boxShadow = '0 0 0 2px rgba(239,68,68,0.4)';
        passwordInput.style.boxShadow = '0 0 0 2px rgba(239,68,68,0.4)';
        showLoginError('Please enter both username and password.');
        return;
      }

      clearFieldHighlight(usernameInput);
      clearFieldHighlight(passwordInput);

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password }),
        });

        if (!response.ok) {
          let message = 'Invalid username or password';
          try {
            const errorPayload = await response.json();
            message = errorPayload?.detail || errorPayload?.message || message;
          } catch (_error) {
            // Keep default message if response body is not JSON.
          }
          throw new Error(message);
        }

        const payload = await response.json();
        sessionStorage.setItem('sastra_user', payload.user?.username || username);
        window.location.href = 'new-scan.html';
      } catch (error) {
        showLoginError(error.message || 'Login failed');
      }
    }
  </script>
</body>
</html>
