<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SASTRA - Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
    <script>
    (function () {
      try {
        var savedTheme = localStorage.getItem("sastra-theme");
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (savedTheme === "dark" || (!savedTheme && prefersDark)) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      } catch (_error) {}
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-start: #c8e6e0;
      --bg-mid:   #dde8f0;
      --bg-end:   #e8ddf0;
      --text-primary: #0a0a0a;
      --text-muted: #6b7280;
      --btn-dark: #0a0a0a;
      --btn-dark-text: #ffffff;
      --card-bg: #f3f3f3;
      --input-bg: #d9d9d9;
      --radius: 14px;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 45%, var(--bg-end) 100%);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
    }

    @supports (height: 100dvh) {
      body { height: 100dvh; }
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.35; pointer-events: none; z-index: 1; }
    .blob-1 { width: 480px; height: 480px; background: radial-gradient(circle, #a7f3d0, transparent 70%); top: -100px; right: 100px; animation: drift 12s ease-in-out infinite alternate; }
    .blob-2 { width: 380px; height: 380px; background: radial-gradient(circle, #bfdbfe, transparent 70%); bottom: -80px; right: 200px; animation: drift 16s 2s ease-in-out infinite alternate; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.06); } }

    nav {
      position: relative;
      z-index: 10;
      padding: 20px 56px;
      flex-shrink: 0;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-primary);
      text-decoration: none;
    }

    .logo svg { width: 26px; height: 26px; }

    .page-center {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 68px);
      padding: 16px 20px;
      overflow: hidden;
    }

    @supports (height: 100dvh) {
      .page-center { height: calc(100dvh - 68px); }
    }

    .card {
      background: var(--card-bg);
      border-radius: 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      padding: 44px 52px 40px;
      width: 100%;
      max-width: 520px;
      text-align: center;
      animation: fadeUp 0.6s ease both;
      flex-shrink: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      font-family: 'Sora', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 0.92rem;
      color: var(--text-muted);
      margin-bottom: 36px;
    }

    .field {
      text-align: left;
      margin-bottom: 24px;
    }

    .field label {
      display: block;
      font-family: 'Sora', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .field input {
      width: 100%;
      background: var(--input-bg);
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text-primary);
      outline: none;
      transition: box-shadow 0.2s ease, background 0.2s ease;
    }

    .field input:focus {
      background: #ccc;
      box-shadow: 0 0 0 2px rgba(10,10,10,0.15);
    }

    .field input.error {
      box-shadow: 0 0 0 2px rgba(239,68,68,0.45);
    }

    .password-hint {
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .field-error {
      margin-top: 8px;
      min-height: 1em;
      font-size: 0.8rem;
      font-weight: 600;
      color: #b91c1c;
    }

    .form-error {
      margin-top: 14px;
      min-height: 1em;
      font-size: 0.84rem;
      font-weight: 600;
      color: #b91c1c;
      text-align: left;
    }

    .btn-submit {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      font-family: 'Sora', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      background: var(--btn-dark);
      color: var(--btn-dark-text);
      border: 1.5px solid var(--btn-dark);
      letter-spacing: 0.01em;
    }

    .btn-submit:hover {
      background: #222;
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.22);
    }

    .btn-submit:active { transform: translateY(0); }

    .card-footer {
      margin-top: 28px;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .card-footer a {
      color: var(--text-primary);
      text-decoration: underline;
      font-weight: 700;
      transition: opacity 0.15s;
    }

    .card-footer a:hover { opacity: 0.6; }

    .privacy-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 20px;
      text-align: left;
    }

    .privacy-row input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      min-width: 18px;
      border: 2px solid rgba(128,128,128,0.45);
      border-radius: 5px;
      background: var(--input-bg);
      cursor: pointer;
      margin-top: 2px;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }

    .privacy-row input[type="checkbox"]:checked {
      background: #0a0a0a;
      border-color: #0a0a0a;
    }

    .privacy-row input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .privacy-row input[type="checkbox"].error {
      border-color: rgba(239,68,68,0.65);
    }

    .privacy-label {
      font-size: 0.86rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .privacy-label a {
      color: var(--text-primary);
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: opacity 0.15s;
    }

    .privacy-label a:hover { opacity: 0.6; }

    .privacy-error {
      font-size: 0.8rem;
      font-weight: 600;
      color: #b91c1c;
      margin-top: 6px;
      min-height: 1em;
      text-align: left;
    }

    /* --- Responsive: smaller laptop screens (e.g. 15") --- */
    @media (max-height: 820px) {
      nav { padding: 14px 56px; }
      .page-center { height: calc(100vh - 56px); padding: 12px 20px; }
      .card { padding: 30px 44px 26px; border-radius: 22px; }
      .card-sub { margin-bottom: 20px; }
      .field { margin-bottom: 14px; }
      .field input { padding: 11px 14px; }
      .privacy-row { margin-top: 10px; }
      .card-footer { margin-top: 16px; }
      .btn-submit { margin-top: 12px; }
    }

    @media (max-height: 750px) {
      nav { padding: 10px 56px; }
      .page-center { height: calc(100vh - 48px); padding: 8px 20px; }
      .card { padding: 22px 36px 18px; border-radius: 20px; }
      .card-title { font-size: 1.3rem; }
      .card-sub { margin-bottom: 14px; font-size: 0.87rem; }
      .field { margin-bottom: 10px; }
      .field label { margin-bottom: 5px; font-size: 0.82rem; }
      .field input { padding: 9px 12px; font-size: 0.9rem; border-radius: 10px; }
      .password-hint { margin-top: 4px; font-size: 0.72rem; }
      .btn-submit { padding: 10px; margin-top: 8px; font-size: 0.88rem; }
      .privacy-row { margin-top: 6px; gap: 8px; }
      .privacy-label { font-size: 0.78rem; }
      .card-footer { margin-top: 12px; font-size: 0.82rem; }
    }

    @media (max-height: 650px) {
      nav { padding: 8px 56px; }
      .page-center { height: calc(100vh - 44px); padding: 6px 20px; }
      .card { padding: 16px 30px 14px; border-radius: 18px; }
      .card-title { font-size: 1.2rem; }
      .card-sub { margin-bottom: 10px; font-size: 0.83rem; }
      .field { margin-bottom: 8px; }
      .field label { margin-bottom: 4px; font-size: 0.8rem; }
      .field input { padding: 8px 10px; font-size: 0.85rem; border-radius: 9px; }
      .password-hint { margin-top: 3px; font-size: 0.7rem; }
      .btn-submit { padding: 9px; margin-top: 6px; font-size: 0.85rem; }
      .privacy-row { margin-top: 4px; gap: 6px; }
      .privacy-row input[type="checkbox"] { width: 15px; height: 15px; min-width: 15px; }
      .privacy-label { font-size: 0.74rem; }
      .card-footer { margin-top: 10px; font-size: 0.8rem; }
    }

    @media (max-width: 560px) {
      nav { padding: 16px 24px; }
      .card { padding: 32px 24px 28px; }
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
  <link rel="stylesheet" href="/static/theme.css"/>
  <script src="/static/theme.js" defer></script>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <nav>
    <a href="sastra-landing.html" class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/>
      </svg>
      SASTRA
    </a>
  </nav>

  <div class="page-center">
    <div class="card">
      <h1 class="card-title">Sign Up</h1>
      <p class="card-sub">Create an Account</p>

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="" autocomplete="username"/>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="" autocomplete="new-password"/>
        <p class="password-hint">Use 8+ chars with upper, lower, number, and special character.</p>
      </div>

      <div class="field">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="" autocomplete="new-password"/>
        <p class="field-error" id="confirm-password-error" role="alert" aria-live="polite"></p>
      </div>

      <div class="privacy-row">
        <input type="checkbox" id="privacy-agree"/>
        <label class="privacy-label" for="privacy-agree">
          I have read and agree to SASTRA's <a href="privacy-policy.html" target="_blank">Privacy Policy</a>. I understand that uploaded code is discarded after scanning and only results are stored.
        </label>
      </div>
      <p class="privacy-error" id="privacy-error" role="alert" aria-live="polite"></p>

      <button class="btn-submit" onclick="handleSignup()">Create Account</button>

      <div style="display:flex;align-items:center;gap:12px;margin-top:20px;margin-bottom:4px;">
        <div style="flex:1;height:1px;background:rgba(0,0,0,0.12);"></div>
        <span style="font-size:0.82rem;color:var(--text-muted);white-space:nowrap;">or continue with</span>
        <div style="flex:1;height:1px;background:rgba(0,0,0,0.12);"></div>
      </div>

      <a href="/auth/google" style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;margin-top:12px;padding:13px;border-radius:999px;border:1.5px solid rgba(0,0,0,0.15);background:#fff;color:#0a0a0a;font-family:'Sora',sans-serif;font-size:0.92rem;font-weight:600;text-decoration:none;transition:box-shadow 0.18s ease,transform 0.18s ease;" onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.12)';this.style.transform='translateY(-1px)'" onmouseout="this.style.boxShadow='';this.style.transform=''">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign up with Google
      </a>

      <p class="card-footer">Already have an account? <a href="signin.html">Sign in</a></p>
    </div>
  </div>

  <script>
    const MIN_PASSWORD_LENGTH = 8;

    function passwordPolicyError(password) {
      if (!password) {
        return 'Password is required.';
      }
      if (password.length < MIN_PASSWORD_LENGTH) {
        return `Password must be at least ${MIN_PASSWORD_LENGTH} characters.`;
      }
      if (/\s/.test(password)) {
        return 'Password cannot contain spaces.';
      }
      if (!/[a-z]/.test(password)) {
        return 'Password must include at least one lowercase letter.';
      }
      if (!/[A-Z]/.test(password)) {
        return 'Password must include at least one uppercase letter.';
      }
      if (!/[0-9]/.test(password)) {
        return 'Password must include at least one number.';
      }
      if (!/[^A-Za-z0-9]/.test(password)) {
        return 'Password must include at least one special character.';
      }
      return '';
    }

    function clearErrors() {
      document.getElementById('confirm-password-error').textContent = '';
      document.getElementById('privacy-error').textContent = '';
      document.querySelectorAll('input').forEach(i => i.classList.remove('error'));
    }

    function setError(message, inputIds = []) {
      inputIds.forEach((id) => {
        const input = document.getElementById(id);
        if (input) input.classList.add('error');
      });
      document.getElementById('confirm-password-error').textContent = message;
    }

    async function handleSignup() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const confirm  = document.getElementById('confirm-password').value.trim();

      clearErrors();

      if (!username) {
        setError('Username is required.', ['username']);
        return;
      }

      const passwordError = passwordPolicyError(password);
      if (passwordError) {
        setError(passwordError, ['password']);
        return;
      }

      if (!confirm) {
        setError('Please confirm your password.', ['confirm-password']);
        return;
      }

      if (password !== confirm) {
        setError('Passwords do not match.', ['password', 'confirm-password']);
        return;
      }

      const privacyChecked = document.getElementById('privacy-agree').checked;
      if (!privacyChecked) {
        document.getElementById('privacy-agree').classList.add('error');
        document.getElementById('privacy-error').textContent = 'You must agree to the Privacy Policy to create an account.';
        return;
      }

      try {
        const response = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password }),
        });
        if (!response.ok) {
          const errorPayload = await response.json().catch(() => ({}));
          setError(errorPayload.detail || 'Signup failed.');
          return;
        }
        const payload = await response.json();
        sessionStorage.setItem('sastra_user', payload.user?.username || username);
        window.location.href = 'new-scan.html';
      } catch (error) {
        setError(error.message || 'Signup failed. Please try again.');
      }
    }
  </script>
</body>
</html>
